name: Build Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      # conda-forge provides pre-built GTK3 + PyGObject for Windows,
      # avoiding the need to build anything from source.
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          channels: conda-forge
          activate-environment: build
          miniforge-version: latest

      - name: Install GTK3 stack (conda) and Python packages (pip)
        run: |
          conda install -y pygobject gtk3 pycairo adwaita-icon-theme
          pip install PyMuPDF "pyHanko[pkcs11]" pyinstaller

      - name: Build executable
        run: python build_windows.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightPDF-Windows
          path: dist/LightPDF-Windows.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LightPDF-Windows.zip
          generate_release_notes: true
