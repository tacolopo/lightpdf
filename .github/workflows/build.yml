name: Build Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-cairo
            mingw-w64-x86_64-python-cffi
            mingw-w64-x86_64-python-cryptography
            mingw-w64-x86_64-adwaita-icon-theme
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-swig

      - name: Install Python packages
        shell: msys2 {0}
        run: |
          # Use a venv (avoids PEP 668 externally-managed error)
          # --system-site-packages keeps pacman-installed gi/cairo/cffi/crypto
          python -m venv --system-site-packages .venv
          source .venv/bin/activate

          # scikit-build-core is PyMuPDF's build backend;
          # install it first so --no-build-isolation can find it
          pip install scikit-build-core setuptools

          # Build PyMuPDF from source using system cmake/ninja/swig
          pip install --no-build-isolation PyMuPDF

          # pyHanko (mostly pure-python) and PyInstaller
          pip install "pyHanko[pkcs11]" pyinstaller

      - name: Build executable
        shell: msys2 {0}
        run: |
          source .venv/bin/activate
          python build_windows.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightPDF-Windows
          path: dist/LightPDF-Windows.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LightPDF-Windows.zip
          generate_release_notes: true
